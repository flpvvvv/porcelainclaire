name: Sync WeChat Articles

on:
  workflow_dispatch:
    inputs:
      article_urls:
        description: >-
          One or more WeChat article URLs — one per line, or comma-separated.
        required: true
        type: string

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  SITE_URL: https://porcelainclaire.com
  VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: sync
        run: uv sync

      - name: Import article(s)
        working-directory: sync
        env:
          ARTICLE_URLS: ${{ github.event.inputs.article_urls }}
        run: |
          set -euo pipefail
          if [ -z "${ARTICLE_URLS//[$' \t\r\n']/}" ]; then
            echo "article_urls is empty."
            exit 1
          fi
          count=0
          while IFS= read -r raw || [ -n "$raw" ]; do
            url="${raw#"${raw%%[![:space:]]*}"}"
            url="${url%"${url##*[![:space:]]}"}"
            [ -z "$url" ] && continue
            count=$((count + 1))
            echo "=== Importing ($count): $url ==="
            uv run sync article "$url"
          done < <(printf '%s' "$ARTICLE_URLS" | tr ',' '\n')
          echo "Done. Imported $count article(s)."

      - name: Trigger Vercel rebuild for newly imported articles
        if: ${{ env.VERCEL_DEPLOY_HOOK != '' }}
        run: |
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK" > /dev/null
          echo "Triggered Vercel deploy hook."
